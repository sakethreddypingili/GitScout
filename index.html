<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="GitScout - Search and explore GitHub profiles and repositories." />
  <title>GitScout – GitHub Profile Explorer</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 class="site-logo">GitScout</h1>
      <p class="site-tagline">Explore GitHub profiles instantly</p>
    </div>
  </header>

  <main class="main-content container">
    <section class="search-section" aria-label="Search GitHub Users">
      <form id="search-form" class="search-form" novalidate>
        <label for="search-input" class="sr-only">GitHub Username</label>
        <input
          type="text"
          id="search-input"
          name="username"
          class="search-input"
          placeholder="Enter GitHub username..."
          autocomplete="off"
          aria-required="true"
        />
        <button type="submit" id="search-btn" class="btn btn--primary">
          Search
        </button>
      </form>
      <div id="search-error" class="error-message" role="alert" aria-live="polite"></div>
    </section>

    <!-- Spinner Loader -->
    <div id="loader" class="loader-wrapper" aria-hidden="true">
      <div class="spinner"></div>
      <p class="loader-text">Fetching profile…</p>
    </div>

    <!-- Profile Results -->
    <section id="profile-section" class="profile-section" aria-label="Profile Results">
      <div id="profile-card" class="profile-card"></div>
    </section>

    <!-- Rate Limit Info -->
    <div id="rate-limit-info" class="rate-limit-bar" aria-live="polite"></div>
  </main>

  <footer class="site-footer">
    <p class="container">&copy; 2024 GitScout. Powered by GitHub API.</p>
  </footer>

  <script src="js/utils.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
